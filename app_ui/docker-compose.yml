version: '3.8'

services:
  informer-app:
    build: .
    container_name: informer-app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      # Exclude node_modules from being overwritten by host mapping if needed, 
      # but since we want to sync, we map the whole folder.
      # If we init inside container, it writes to host via this volume.
    working_dir: /app
    environment:
      - NODE_ENV=development
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=10.27.37.172
    command: tail -f /dev/null
